<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EcoHeroi</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div id="hud-left">
      <div class="waste-counter"><span class="label">P Plastico</span><div class="bar-wrap"><div class="bar-fill" id="bar-plastic"></div></div><span class="count" id="num-plastic">0/5</span></div>
      <div class="waste-counter"><span class="label">M Metal</span><div class="bar-wrap"><div class="bar-fill" id="bar-metal"></div></div><span class="count" id="num-metal">0/5</span></div>
      <div class="waste-counter"><span class="label">O Organico</span><div class="bar-wrap"><div class="bar-fill" id="bar-organic"></div></div><span class="count" id="num-organic">0/5</span></div>
    </div>
    <div id="hud-center">
      <div id="env-label">RESTAURACAO AMBIENTAL</div>
      <div id="env-bar-wrap"><div id="env-bar-fill"></div><span id="env-pct">15%</span></div>
      <div id="score-display">Pontos: <span id="score">0</span></div>
    </div>
    <div id="hud-right">
      <div id="health-label">ENERGIA</div>
      <div id="health-bar-wrap"><div id="health-bar-fill"></div></div>
      <div id="powerup-display">Power-up: <span id="active-pu">Nenhum</span></div>
    </div>
  </div>
  <div id="boss-hud" class="hidden">
    <span id="boss-title">BARAO DO DESPERDICIO</span>
    <div id="boss-bar-wrap"><div id="boss-bar-fill"></div></div>
    <span id="phase-display">Preparacao</span>
  </div>
  <canvas id="gameCanvas" width="800" height="420"></canvas>
  <div id="controls-bar" style="color: #fff; font-size: 6px; text-align: center; margin-top: 5px;">Setas/WASD Mover | Espaco Pular | [E] Adubo | Clique no canvas p/ focar</div>
  <div id="overlay">
    <div id="overlay-box">
      <div id="overlay-title">EcoHeroi</div>
      <div id="overlay-msg">Producao Sustentavel</div>
      <button id="overlay-btn">INICIAR</button>
    </div>
  </div>
  <div id="toast" class="hidden"></div>
</div>
<script src="script.js"></script>
</body>
</html>
